<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>サンプル動画</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <video autoplay muted playsinline loop preload="metadata" aria-label="プログラムのサンプル動画（自動再生・音声なし）">
    <source src="sample-video.mp4" type="video/mp4" />
  </video>
</body>
</html>
